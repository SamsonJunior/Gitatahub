<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — GitataHub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-deep: #0e5c30;
        --green-mid: #1a7a42;
        --green-light: #25a35a;
        --gold: #d4a017;
        --ink: #0d1f14;
        --border: #c4dfd0;
      }
      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #0e5c30 0%,
          #1a7a42 50%,
          #25a35a 100%
        );
        padding: 1rem;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: absolute;
        top: -100px;
        right: -100px;
        width: 400px;
        height: 400px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 50%;
      }
      body::after {
        content: "";
        position: absolute;
        bottom: -100px;
        left: -100px;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 50%;
      }
      .card {
        background: #fff;
        border-radius: 24px;
        padding: 2.5rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
        position: relative;
        z-index: 1;
      }
      .logo {
        text-align: center;
        margin-bottom: 2rem;
      }
      .logo-icon {
        width: 72px;
        height: 72px;
        background: linear-gradient(
          135deg,
          var(--green-deep),
          var(--green-mid)
        );
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        font-size: 2rem;
        box-shadow: 0 8px 24px rgba(14, 92, 48, 0.3);
      }
      .logo h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--green-deep);
      }
      .logo h1 span {
        color: var(--gold);
      }
      .logo p {
        font-size: 0.8rem;
        color: #789;
        margin-top: 0.3rem;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .form-group {
        margin-bottom: 1.2rem;
      }
      .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 0.5rem;
      }
      .input-wrap {
        position: relative;
      }
      .input-wrap input {
        width: 100%;
        padding: 0.85rem 1rem 0.85rem 2.8rem;
        border: 2px solid var(--border);
        border-radius: 10px;
        font-size: 0.95rem;
        outline: none;
        transition: all 0.2s;
        font-family: inherit;
        color: var(--ink);
        background: #fafafa;
      }
      .input-wrap input:focus {
        border-color: var(--green-mid);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(26, 122, 66, 0.08);
      }
      .input-icon {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
      }
      .eye-btn {
        position: absolute;
        right: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
      }
      .login-btn {
        width: 100%;
        background: linear-gradient(
          135deg,
          var(--green-deep),
          var(--green-mid)
        );
        color: #fff;
        padding: 0.95rem;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
        box-shadow: 0 4px 16px rgba(14, 92, 48, 0.3);
      }
      .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(14, 92, 48, 0.4);
      }
      .login-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }
      .error-box {
        background: #fee2e2;
        color: #991b1b;
        padding: 0.8rem 1rem;
        border-radius: 8px;
        font-size: 0.83rem;
        margin-bottom: 1rem;
        display: none;
        border: 1px solid #fca5a5;
      }
      .error-box.show {
        display: block;
      }
      .attempts {
        text-align: center;
        font-size: 0.75rem;
        color: #aaa;
        margin-top: 0.8rem;
      }
      .back {
        text-align: center;
        margin-top: 1.5rem;
      }
      .back a {
        color: var(--green-mid);
        font-size: 0.83rem;
        text-decoration: none;
        font-weight: 600;
      }
      .secure-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        margin-top: 1.2rem;
        font-size: 0.72rem;
        color: #aaa;
      }
      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.4rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🌍</div>
        <h1>Gitata<span>Hub</span></h1>
        <p>Admin Portal · Authorized Access Only</p>
      </div>
      <div class="error-box" id="errorBox">
        <span id="errorText">Incorrect password. Please try again.</span>
      </div>
      <div class="form-group">
        <label>Admin Password</label>
        <div class="input-wrap">
          <span class="input-icon"></span>
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter your admin password"
            onkeypress="if (event.key === 'Enter') login();"
          />
          <button class="eye-btn" onclick="togglePwd()"></button>
        </div>
      </div>
      <button class="login-btn" id="loginBtn" onclick="login()">
        Login to Dashboard
      </button>
      <div class="attempts" id="attemptsMsg"></div>
      <div class="back"><a href="index.html">← Back to GitataHub</a></div>
      <div class="secure-badge">Secured Admin Access · GitataHub 2026</div>
    </div>
    <script>
      // NOTE: the password check itself now happens server-side in /api/login.
      // This client-side attempt counter is only a UX nicety (slows down
      // impatient double-clicking); it is NOT a security control. Real
      // protection (rate limiting, cookie signing, expiry) lives in
      // /api/login.js and middleware.js.
      let attempts = 0;

      function togglePwd() {
        const i = document.getElementById("passwordInput");
        i.type = i.type === "password" ? "text" : "password";
      }

      async function login() {
        const pwd = document.getElementById("passwordInput").value;
        const btn = document.getElementById("loginBtn");
        const errorBox = document.getElementById("errorBox");

        if (attempts >= 5) {
          document.getElementById("errorText").textContent =
            "Too many failed attempts. Please wait a few minutes and try again.";
          errorBox.classList.add("show");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>Verifying...';
        errorBox.classList.remove("show");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pwd }),
          });

          if (response.ok) {
            btn.innerHTML = "Access Granted! Redirecting...";
            window.location.href = "admin.html";
            return;
          }

          const data = await response.json().catch(() => ({}));
          attempts++;
          errorBox.classList.add("show");
          document.getElementById("errorText").textContent =
            data.error === "Server not configured"
              ? "Admin login isn't configured yet. Contact the site owner."
              : "Incorrect password. Please try again.";
          document.getElementById("passwordInput").value = "";
          btn.disabled = false;
          btn.innerHTML = "Login to Dashboard";
          const remaining = 5 - attempts;
          document.getElementById("attemptsMsg").textContent =
            remaining > 0
              ? remaining + " attempt(s) remaining"
              : "Please wait a few minutes before trying again.";
        } catch (err) {
          errorBox.classList.add("show");
          document.getElementById("errorText").textContent =
            "Couldn't reach the server. Check your connection and try again.";
          btn.disabled = false;
          btn.innerHTML = "Login to Dashboard";
        }
      }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
